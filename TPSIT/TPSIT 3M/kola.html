<!DOCTYPE html>
<html>
<head>
<style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #808080;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #FFF200;
}

caption {
  font-size: 18px;
  font-weight: bold;
  padding-bottom: 10px;
}
</style>
</head>
<body>

<table>
    <caption>Storia di Cartagine</caption>
    <tr>
      <th></th>
      <th>I personaggi</th>
    </tr>
    <tr>
      <td>A</td>
      <td>
        <b>Annibale</b><br>
        Condottiero cartaginese che sfida a Roma invadendo l'Italia durante la Seconda guerra punica.<br><br>
        <b>Adrubale</b><br>
        Fratello di Annibale, fu ucciso nella battaglia del Metauro.
      </td>
    </tr>
</table>

</body>
</html>
