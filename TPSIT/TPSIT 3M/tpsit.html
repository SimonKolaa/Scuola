<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - Giornale scolastico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Contatti</a></li>
        <li><a href="#">Registrati</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h1>Registrazione</h1>
    <form action="registra.php" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
      </div>
      <div class="form-group">
        <label for="cognome">Cognome:</label>
        <input type="text" id="cognome" name="cognome" required>
      </div>
      <div class="form-group">
        <label for="data_nascita">Data di nascita:</label>
        <input type="date" id="data_nascita" name="data_nascita" required>
      </div>
      <div class="form-group">
        <label for="nazionalita">Nazionalità:</label>
        <select id="nazionalita" name="nazionalita" required>
          <option value="Italia">Italia</option>
          <option value="Francia">Francia</option>
          <option value="Germania">Germania</option>
          <option value="Spagna">Spagna</option>
          <option value="Regno Unito">Regno Unito</option>
        </select>
      </div>
      <div class="form-group">
        <label for="sesso">Sesso:</label>
        <div>
          <input type="radio" id="maschio" name="sesso" value="maschio" required>
          <label for="maschio">Maschio</label>
        </div>
        <div>
          <input type="radio" id="femmina" name="sesso" value="femmina" required>
          <label for="femmina">Femmina</label>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="nickname">Nickname:</label>
        <input type="text" id="nickname" name="nickname" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group">
        <label for="classe">Classe:</label>
        <input type="number" id="classe" name="classe" min="1" max="5" required>
      </div>
      <div class="form-group">
        <input type="checkbox" id="privacy" name="privacy" required>
        <label for="privacy">Acconsento al trattamento dei miei dati personali</label>
      </div>
      <div class="form-group">
        <label for="documento">Carica documento:</label>
        <input type="file" id="documento" name="documento">
      </div>
      <button type="submit">Invia</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2024 Giornale scolastico</p>
  </footer>
</body>
</html>
